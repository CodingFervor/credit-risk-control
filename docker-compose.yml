version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment: { POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres, POSTGRES_DB: risk_control }
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data, ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  kafka:
    image: bitnami/kafka:3.7
    ports: ["9092:9092"]
    environment: { ALLOW_PLAINTEXT_LISTENER: "yes" }
volumes:
  pgdata:
